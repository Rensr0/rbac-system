<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>RBAC 权限管理系统</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="../assets/css/global.css?v=2.0.0">
  <link rel="stylesheet" href="../assets/css/pc.css?v=2.0.0">
  <link rel="stylesheet" href="../assets/css/app.css?v=2.0.0">
  <link rel="stylesheet" href="../assets/css/themes.css?v=2.0.0">
</head>
<body>

<!-- PC / Pad 端布局 -->
<div class="pc-layout" id="pc-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h2>🔐 RBAC</h2>
      <p>权限管理系统 v2.0</p>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" onclick="logoutPC()" style="color:rgba(255,255,255,0.5)">
        <span class="nav-icon">🚪</span><span>退出登录</span>
      </div>
    </div>
  </aside>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left"><h1 id="page-title">系统首页</h1></div>
      <div class="topbar-right">
        <div class="user-info">
          <div class="user-avatar" id="pc-avatar">A</div>
          <span id="pc-nickname">管理员</span>
        </div>
        <div id="pc-theme-switcher"></div>
      </div>
    </div>
    <div class="page-content" id="page-content">
      <div class="text-center" style="padding:48px"><div class="spinner" style="margin:0 auto"></div></div>
    </div>
  </div>
</div>

<!-- 手机端 APP 风格布局（动态生成） -->
<div class="app-shell" id="app-shell">
  <div class="app-navbar">
    <div class="navbar-back" id="navbar-back" style="display:none">‹</div>
    <div class="navbar-title">首页</div>
    <div class="navbar-action" id="navbar-action"></div>
  </div>
  <div class="app-pages" id="app-pages"></div>
  <div class="app-tabbar" id="app-tabbar"></div>
</div>

<!-- PC 端弹窗容器（由 modals.js 动态注入） -->
<div id="modal-container"></div>

<script src="../assets/js/core.js?v=2.0.0"></script>
<script src="../assets/js/theme-switcher.js?v=2.0.0"></script>
<script src="../assets/js/modals.js?v=2.0.0"></script>
<script src="../assets/js/app.js?v=2.0.0"></script>
<script src="../assets/js/pc-pages.js?v=2.0.0"></script>
<script>
(function () {
  if (window.innerWidth <= 768) return;

  var currentUser = null;
  var userRouters = [];

  function init() {
    API.get('login/').then(function(res) {
      if (res.code !== 200) { window.location.href = '../index.html'; return; }
      currentUser = res.data;
      Storage.set('currentUser', currentUser);

      document.getElementById('pc-nickname').textContent = currentUser.nickname || currentUser.username;
      document.getElementById('pc-avatar').textContent = getInitial(currentUser.nickname || currentUser.username);

      // 注入 PC 端弹窗
      if (window.ModalTemplates) ModalTemplates.inject();
      if (window.ThemeSwitcher) ThemeSwitcher.initPC(document.getElementById('pc-theme-switcher'));

      API.get('router/', { action: 'user' }).then(function(rRes) {
        if (rRes.code === 200) {
          userRouters = rRes.data || [];
          window._userRouters = userRouters;
          renderSidebar();
          var first = userRouters.length > 0 ? userRouters[0].router_path : 'home';
          pcNavigate(first);
        }
      });
    });
  }

  function renderSidebar() {
    document.getElementById('sidebar-nav').innerHTML = userRouters.map(function(r) {
      return '<div class="nav-item" data-page="' + r.router_path + '" onclick="pcNavigate(\'' + r.router_path + '\')">'
        + '<span class="nav-icon">' + (r.icon || '📄') + '</span><span>' + escapeHtml(r.router_name) + '</span>'
        + '</div>';
    }).join('');
  }

  window.pcNavigate = function (page) {
    document.querySelectorAll('.nav-item').forEach(function(n) {
      n.classList.toggle('active', n.dataset.page === page);
    });
    var route = userRouters.find(function(r) { return r.router_path === page; });
    document.getElementById('page-title').textContent = route ? route.router_name : page;

    var container = document.getElementById('page-content');
    container.innerHTML = '<div class="text-center" style="padding:48px"><div class="spinner" style="margin:0 auto"></div></div>';

    var loaders = {
      home: PCPages.loadHome,
      user: PCPages.loadUser,
      role: PCPages.loadRole,
      router: PCPages.loadRouter,
      mine: PCPages.loadMine
    };
    if (loaders[page]) {
      loaders[page](container);
    } else {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">🚫</div><p>页面不存在</p></div>';
    }
  };

  window.logoutPC = function () {
    API.post('login/?action=logout').then(function() {}).catch(function() {});
    Storage.remove('currentUser');
    window.location.href = '../index.html';
  };

  init();
})();
</script>

</body>
</html>
