<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>RBAC 权限管理系统</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="../assets/css/global.css?v=1.0.7">
  <link rel="stylesheet" href="../assets/css/pc.css?v=1.0.7">
  <link rel="stylesheet" href="../assets/css/app.css?v=1.0.7">
  <link rel="stylesheet" href="../assets/css/themes.css?v=1.0.7">
</head>
<body>

<!-- ========================================
     PC / Pad 端布局
     ======================================== -->
<div class="pc-layout" id="pc-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h2>🔐 RBAC</h2>
      <p>权限管理系统 v1.0</p>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" onclick="logoutPC()" style="color:rgba(255,255,255,0.5)">
        <span class="nav-icon">🚪</span><span>退出登录</span>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left"><h1 id="page-title">系统首页</h1></div>
      <div class="topbar-right">
        <div class="user-info">
          <div class="user-avatar" id="pc-avatar">A</div>
          <span id="pc-nickname">管理员</span>
        </div>
        <div id="pc-theme-switcher"></div>
      </div>
    </div>
    <div class="page-content" id="page-content">
      <div class="text-center" style="padding:48px"><div class="spinner" style="margin:0 auto"></div></div>
    </div>
  </div>
</div>

<!-- ========================================
     手机端 APP 风格布局
     ======================================== -->
<div class="app-shell" id="app-shell">
  <div class="app-navbar">
    <div class="navbar-back" id="navbar-back" style="display:none">‹</div>
    <div class="navbar-title">首页</div>
    <div class="navbar-action" id="navbar-action"></div>
  </div>

  <div class="app-pages">
    <div class="app-page active" id="page-home"><div class="app-page-content"></div></div>
    <div class="app-page" id="page-user"><div class="app-page-content"></div></div>
    <div class="app-page" id="page-role"><div class="app-page-content"></div></div>
    <div class="app-page" id="page-router"><div class="app-page-content"></div></div>
    <div class="app-page" id="page-mine"><div class="app-page-content"></div></div>
  </div>

  <div class="app-tabbar">
    <div class="tab-item active" data-page="home">
      <span class="tab-icon">🏠</span><span class="tab-label">首页</span>
    </div>
    <div class="tab-item" data-page="user">
      <span class="tab-icon">👥</span><span class="tab-label">用户</span>
    </div>
    <div class="tab-item" data-page="role">
      <span class="tab-icon">🎭</span><span class="tab-label">角色</span>
    </div>
    <div class="tab-item" data-page="router">
      <span class="tab-icon">🧭</span><span class="tab-label">路由</span>
    </div>
    <div class="tab-item" data-page="mine">
      <span class="tab-icon">👤</span><span class="tab-label">我的</span>
    </div>
  </div>
</div>

<script src="../assets/js/core.js?v=1.1.4"></script>
<script src="../assets/js/theme-switcher.js?v=1.1.4"></script>
<script src="../assets/js/app.js?v=1.1.4"></script>
<script>
// ==========================================
// PC 端逻辑
// ==========================================
(function () {
  if (window.innerWidth <= 768) return;

  let currentUser = null;
  let userRouters = [];

  async function init() {
    const loginRes = await API.get('login/');
    // 只有明确未登录(401)才跳转，其他错误留在当前页
    if (loginRes.code !== 200) { window.location.href = '../index.html'; return; }
    currentUser = loginRes.data;
    Storage.set('currentUser', currentUser);

    document.getElementById('pc-nickname').textContent = currentUser.nickname || currentUser.username;
    document.getElementById('pc-avatar').textContent = getInitial(currentUser.nickname || currentUser.username);

    // 初始化主题切换器
    if (window.ThemeSwitcher) ThemeSwitcher.initPC(document.getElementById('pc-theme-switcher'));

    const routerRes = await API.get('router/', { action: 'user' });
    if (routerRes.code === 200) {
      userRouters = routerRes.data || [];
      renderSidebar();
      pcNavigate(userRouters[0]?.router_path || 'home');
    }
  }

  function renderSidebar() {
    document.getElementById('sidebar-nav').innerHTML = userRouters.map(r =>
      `<div class="nav-item" data-page="${r.router_path}" onclick="pcNavigate('${r.router_path}')">
        <span class="nav-icon">${r.icon || '📄'}</span><span>${r.router_name}</span>
      </div>`
    ).join('');
  }

  window.pcNavigate = function (page) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === page));
    const route = userRouters.find(r => r.router_path === page);
    document.getElementById('page-title').textContent = route?.router_name || page;

    const container = document.getElementById('page-content');
    container.innerHTML = '<div class="text-center" style="padding:48px"><div class="spinner" style="margin:0 auto"></div></div>';

    const pages = { home: loadPCHome, user: loadPCUser, role: loadPCRole, router: loadPCRouter, mine: loadPCMine };
    (pages[page] || (() => container.innerHTML = '<div class="empty-state"><div class="empty-icon">🚫</div><p>页面不存在</p></div>'))(container);
  };

  // ---- 首页 ----
  async function loadPCHome(c) {
    const [uR, rR, rtR] = await Promise.all([
      API.get('user/', { limit: 1 }),
      API.get('role/', { limit: 100 }),
      API.get('router/'),
    ]);
    c.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value">${uR.data?.total||0}</div><div class="stat-label">系统用户</div></div>
        <div class="stat-card"><div class="stat-icon">🎭</div><div class="stat-value">${rR.data?.total||0}</div><div class="stat-label">角色数量</div></div>
        <div class="stat-card"><div class="stat-icon">🧭</div><div class="stat-value">${(rtR.data||[]).length}</div><div class="stat-label">路由权限</div></div>
        <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value" style="color:var(--success)">正常</div><div class="stat-label">系统状态</div></div>
      </div>
      <div class="card"><div class="card-header">欢迎回来，${escapeHtml(currentUser.nickname||currentUser.username)}</div>
        <div class="card-body">
          <p style="color:var(--text-secondary)">RBAC 权限管理系统 v1.0 运行正常。通过左侧菜单管理用户、角色和路由权限。</p>
          <div style="margin-top:16px;display:flex;gap:12px;flex-wrap:wrap">
            ${userRouters.some(r=>r.router_path==='user')?'<button class="btn btn-primary" onclick="pcNavigate(\'user\')">管理用户</button>':''}
            ${userRouters.some(r=>r.router_path==='role')?'<button class="btn btn-outline" onclick="pcNavigate(\'role\')">配置角色</button>':''}
            ${userRouters.some(r=>r.router_path==='router')?'<button class="btn btn-outline" onclick="pcNavigate(\'router\')">路由权限</button>':''}
          </div>
        </div>
      </div>`;
  }

  // ---- 用户管理 ----
  let pcUserPage = 1;
  async function loadPCUser(c, kw) {
    kw = kw || document.getElementById('pc-user-search')?.value || '';
    const res = await API.get('user/', { page: pcUserPage, limit: 10, keyword: kw });
    if (res.code !== 200) { showToast(res.msg); return; }
    const { list = [], total = 0 } = res.data || {};
    const pages = Math.ceil(total / 10) || 1;

    c.innerHTML = `
      <div class="page-header">
        <div><h2>用户管理</h2><div class="subtitle">共 ${total} 个用户</div></div>
        <button class="btn btn-primary" onclick="pcAddUser()">＋ 新增用户</button>
      </div>
      <div class="search-bar">
        <input class="form-input" id="pc-user-search" placeholder="搜索用户名/昵称" value="${escapeHtml(kw)}" onkeyup="if(event.key==='Enter'){pcUserPage=1;loadPCUser(document.getElementById('page-content'))}">
        <button class="btn btn-outline" onclick="pcUserPage=1;loadPCUser(document.getElementById('page-content'))">搜索</button>
      </div>
      <div class="card"><div class="table-wrap"><table>
        <thead><tr><th>ID</th><th>账号</th><th>昵称</th><th>角色</th><th>状态</th><th>最后登录</th><th>操作</th></tr></thead>
        <tbody>${list.length===0?'<tr><td colspan="7" class="text-center text-secondary" style="padding:32px">暂无数据</td></tr>':''}
          ${list.map(u=>`<tr>
            <td>${u.id}</td>
            <td>${escapeHtml(u.username)} ${u.is_super?'<span class="badge badge-warning">超级</span>':''}</td>
            <td>${escapeHtml(u.nickname)}</td>
            <td>${(u.roles||[]).map(r=>'<span class="badge badge-info">'+escapeHtml(r.role_name)+'</span>').join(' ')||'<span class="text-secondary">无</span>'}</td>
            <td>${u.status==1?'<span class="badge badge-success">正常</span>':'<span class="badge badge-danger">禁用</span>'}</td>
            <td class="text-sm text-secondary">${u.last_login?formatDate(u.last_login):'从未登录'}</td>
            <td><div class="action-btns">
              <button class="btn btn-sm btn-outline" onclick="pcEditUser(${u.id})">编辑</button>
              ${!u.is_super?`<button class="btn btn-sm btn-danger" onclick="pcDeleteUser(${u.id})">删除</button>`:''}
            </div></td></tr>`).join('')}
        </tbody></table></div></div>
      <div class="pagination">
        <button ${pcUserPage<=1?'disabled':''} onclick="pcUserPage--;loadPCUser(document.getElementById('page-content'))">上一页</button>
        <span class="text-sm text-secondary">第 ${pcUserPage}/${pages} 页</span>
        <button ${pcUserPage>=pages?'disabled':''} onclick="pcUserPage++;loadPCUser(document.getElementById('page-content'))">下一页</button>
      </div>`;
  }

  window.pcAddUser = async function () {
    const roles = (await API.get('role/', { limit: 100 })).data?.list || [];
    document.getElementById('modal-user-title').textContent = '新增用户';
    document.getElementById('form-user-id').value = '';
    const uEl = document.getElementById('form-user-username'); uEl.value = ''; uEl.disabled = false;
    document.getElementById('form-user-password').value = '123456';
    document.getElementById('form-user-password').closest('.form-group').style.display = '';
    document.getElementById('form-user-nickname').value = '';
    document.getElementById('form-user-email').value = '';
    document.getElementById('form-user-phone').value = '';
    document.getElementById('form-user-roles').innerHTML = roles.map(r =>
      `<div class="tree-item"><input type="checkbox" value="${r.id}" class="user-role-cb"><span>${escapeHtml(r.role_name)}</span></div>`
    ).join('');
    openModal('modal-user');
  };

  window.pcEditUser = async function (id) {
    const res = await API.get('user/', { action: 'detail', id });
    if (res.code!==200) { showToast(res.msg); return; }
    const u = res.data;
    const roles = (await API.get('role/', { limit: 100 })).data?.list || [];
    document.getElementById('modal-user-title').textContent = '编辑用户';
    document.getElementById('form-user-id').value = u.id;
    const uEl = document.getElementById('form-user-username'); uEl.value = u.username; uEl.disabled = true;
    document.getElementById('form-user-password').closest('.form-group').style.display = 'none';
    document.getElementById('form-user-nickname').value = u.nickname;
    document.getElementById('form-user-email').value = u.email||'';
    document.getElementById('form-user-phone').value = u.phone||'';
    document.getElementById('form-user-roles').innerHTML = roles.map(r =>
      `<div class="tree-item"><input type="checkbox" value="${r.id}" class="user-role-cb" ${(u.role_ids||[]).includes(r.id)?'checked':''}><span>${escapeHtml(r.role_name)}</span></div>`
    ).join('');
    openModal('modal-user');
  };

  window.saveUser = async function () {
    const id = document.getElementById('form-user-id').value;
    const username = document.getElementById('form-user-username').value.trim();
    const password = document.getElementById('form-user-password').value.trim();
    const nickname = document.getElementById('form-user-nickname').value.trim();
    const email = document.getElementById('form-user-email').value.trim();
    const phone = document.getElementById('form-user-phone').value.trim();
    const roleIds = Array.from(document.querySelectorAll('.user-role-cb:checked')).map(cb=>parseInt(cb.value));
    if (!username) { showToast('请输入账号'); return; }

    let res;
    if (id) {
      res = await API.post('user/', { action:'update', id:parseInt(id), nickname, email, phone });
      await API.post('user/', { action:'roles', user_id:parseInt(id), role_ids:roleIds });
    } else {
      res = await API.post('user/', { username, password:password||'123456', nickname, email, phone, role_ids:roleIds });
    }
    showToast(res.msg);
    if (res.code===200) { closeModal('modal-user'); loadPCUser(document.getElementById('page-content')); }
  };

  window.pcDeleteUser = async function (id) {
    if (!await confirmDialog('删除用户','确定要删除此用户吗？此操作不可恢复。')) return;
    const res = await API.post('user/', { action:'delete', id });
    showToast(res.msg);
    if (res.code===200) loadPCUser(document.getElementById('page-content'));
  };

  // ---- 角色管理 ----
  async function loadPCRole(c) {
    const res = await API.get('role/', { limit: 100 });
    const list = res.data?.list || [];
    c.innerHTML = `
      <div class="page-header">
        <div><h2>角色管理</h2><div class="subtitle">共 ${list.length} 个角色</div></div>
        <button class="btn btn-primary" onclick="pcAddRole()">＋ 新增角色</button>
      </div>
      <div class="card"><div class="table-wrap"><table>
        <thead><tr><th>ID</th><th>角色名称</th><th>备注</th><th>用户数</th><th>权限列表</th><th>操作</th></tr></thead>
        <tbody>${list.map(r=>`<tr>
          <td>${r.id}</td><td><strong>${escapeHtml(r.role_name)}</strong></td>
          <td class="text-secondary">${escapeHtml(r.remark||'-')}</td>
          <td>${r.user_count||0}</td>
          <td>${(r.routers||[]).map(rt=>'<span class="badge badge-info">'+escapeHtml(rt.icon)+' '+escapeHtml(rt.router_name)+'</span>').join(' ')||'<span class="text-secondary">无</span>'}</td>
          <td><div class="action-btns">
            <button class="btn btn-sm btn-outline" onclick="pcEditRole(${r.id})">编辑</button>
            ${r.id!==1?`<button class="btn btn-sm btn-danger" onclick="pcDeleteRole(${r.id})">删除</button>`:''}
          </div></td></tr>`).join('')}
        </tbody></table></div></div>`;
  }

  window.pcAddRole = async function () {
    const routers = (await API.get('router/')).data || [];
    document.getElementById('modal-role-title').textContent = '新增角色';
    document.getElementById('form-role-id').value = '';
    const nEl = document.getElementById('form-role-name'); nEl.value = ''; nEl.disabled = false;
    document.getElementById('form-role-remark').value = '';
    document.getElementById('form-role-routers').innerHTML = routers.map(r =>
      `<div class="tree-item"><input type="checkbox" value="${r.id}" class="role-router-cb"><span>${escapeHtml(r.icon)} ${escapeHtml(r.router_name)}</span></div>`
    ).join('');
    openModal('modal-role');
  };

  window.pcEditRole = async function (id) {
    const [roleRes, routerRes] = await Promise.all([API.get('role/',{limit:100}), API.get('router/')]);
    const role = (roleRes.data?.list||[]).find(r=>r.id===id);
    const routers = routerRes.data||[];
    if (!role) { showToast('角色不存在'); return; }
    document.getElementById('modal-role-title').textContent = '编辑角色';
    document.getElementById('form-role-id').value = role.id;
    const nEl = document.getElementById('form-role-name'); nEl.value = role.role_name; nEl.disabled = (id===1);
    document.getElementById('form-role-remark').value = role.remark||'';
    document.getElementById('form-role-routers').innerHTML = routers.map(r =>
      `<div class="tree-item"><input type="checkbox" value="${r.id}" class="role-router-cb" ${(role.router_ids||[]).includes(r.id)?'checked':''}><span>${escapeHtml(r.icon)} ${escapeHtml(r.router_name)}</span></div>`
    ).join('');
    openModal('modal-role');
  };

  window.saveRole = async function () {
    const id = document.getElementById('form-role-id').value;
    const roleName = document.getElementById('form-role-name').value.trim();
    const remark = document.getElementById('form-role-remark').value.trim();
    const routerIds = Array.from(document.querySelectorAll('.role-router-cb:checked')).map(cb=>parseInt(cb.value));
    if (!roleName) { showToast('请输入角色名称'); return; }
    let res;
    if (id) {
      res = await API.post('role/', { action:'update', id:parseInt(id), role_name:roleName, remark });
      await API.post('role/', { action:'routers', role_id:parseInt(id), router_ids:routerIds });
    } else {
      res = await API.post('role/', { role_name:roleName, remark, router_ids:routerIds });
    }
    showToast(res.msg);
    if (res.code===200) { closeModal('modal-role'); loadPCRole(document.getElementById('page-content')); }
  };

  window.pcDeleteRole = async function (id) {
    if (!await confirmDialog('删除角色','确定要删除此角色？关联的用户权限将被清除。')) return;
    const res = await API.post('role/', { action:'delete', id });
    showToast(res.msg);
    if (res.code===200) loadPCRole(document.getElementById('page-content'));
  };

  // ---- 路由管理 ----
  async function loadPCRouter(c) {
    const list = (await API.get('router/')).data || [];
    c.innerHTML = `
      <div class="page-header">
        <div><h2>路由管理</h2><div class="subtitle">共 ${list.length} 条路由</div></div>
        <button class="btn btn-primary" onclick="pcAddRouter()">＋ 新增路由</button>
      </div>
      <div class="card"><div class="table-wrap"><table>
        <thead><tr><th>ID</th><th>图标</th><th>名称</th><th>路径</th><th>排序</th><th>状态</th><th>绑定角色</th><th>操作</th></tr></thead>
        <tbody>${list.map(r=>`<tr>
          <td>${r.id}</td><td style="font-size:20px">${r.icon||'-'}</td>
          <td><strong>${escapeHtml(r.router_name)}</strong></td>
          <td><code>${escapeHtml(r.router_path)}</code></td>
          <td>${r.sort}</td>
          <td>${r.status==1?'<span class="badge badge-success">启用</span>':'<span class="badge badge-danger">禁用</span>'}</td>
          <td>${r.role_count||0} 个角色</td>
          <td><div class="action-btns">
            <button class="btn btn-sm btn-outline" onclick="pcEditRouter(${r.id})">编辑</button>
            <button class="btn btn-sm btn-danger" onclick="pcDeleteRouter(${r.id})">删除</button>
          </div></td></tr>`).join('')}
        </tbody></table></div></div>`;
  }

  window.pcAddRouter = function () {
    document.getElementById('modal-router-title').textContent = '新增路由';
    document.getElementById('form-router-id').value = '';
    document.getElementById('form-router-name').value = '';
    document.getElementById('form-router-path').value = '';
    document.getElementById('form-router-icon').value = '';
    document.getElementById('form-router-sort').value = '0';
    openModal('modal-router');
  };

  window.pcEditRouter = async function (id) {
    const list = (await API.get('router/')).data || [];
    const r = list.find(x=>x.id===id);
    if (!r) { showToast('路由不存在'); return; }
    document.getElementById('modal-router-title').textContent = '编辑路由';
    document.getElementById('form-router-id').value = r.id;
    document.getElementById('form-router-name').value = r.router_name;
    document.getElementById('form-router-path').value = r.router_path;
    document.getElementById('form-router-icon').value = r.icon||'';
    document.getElementById('form-router-sort').value = r.sort;
    openModal('modal-router');
  };

  window.saveRouter = async function () {
    const id = document.getElementById('form-router-id').value;
    const routerName = document.getElementById('form-router-name').value.trim();
    const routerPath = document.getElementById('form-router-path').value.trim();
    const icon = document.getElementById('form-router-icon').value.trim();
    const sort = parseInt(document.getElementById('form-router-sort').value)||0;
    if (!routerName||!routerPath) { showToast('名称和路径不能为空'); return; }
    const res = id
      ? await API.post('router/', { action:'update', id:parseInt(id), router_name:routerName, router_path:routerPath, icon, sort })
      : await API.post('router/', { router_name:routerName, router_path:routerPath, icon, sort });
    showToast(res.msg);
    if (res.code===200) { closeModal('modal-router'); loadPCRouter(document.getElementById('page-content')); }
  };

  window.pcDeleteRouter = async function (id) {
    if (!await confirmDialog('删除路由','确定要删除此路由？')) return;
    const res = await API.post('router/', { action:'delete', id });
    showToast(res.msg);
    if (res.code===200) loadPCRouter(document.getElementById('page-content'));
  };

  // ---- 个人中心 ----
  async function loadPCMine(c) {
    c.innerHTML = `
      <div class="page-header"><h2>个人中心</h2></div>
      <div style="display:flex;justify-content:center">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:32px;max-width:1200px;width:100%">
          <div class="card"><div class="card-body" style="padding:32px">
            <div style="display:flex;align-items:center;gap:24px;margin-bottom:32px;padding-bottom:32px;border-bottom:1px solid var(--border-light)">
              <div style="width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:600;flex-shrink:0">${getInitial(currentUser.nickname||currentUser.username)}</div>
              <div>
                <h3 style="margin:0 0 12px;font-size:28px">${escapeHtml(currentUser.nickname||currentUser.username)}</h3>
                <p class="text-secondary" style="margin:0;font-size:16px">${currentUser.is_super?'<span style="color:var(--primary);font-weight:500">超级管理员</span>':'普通用户'}</p>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
              <div class="form-group"><label class="form-label" style="font-size:15px">账号</label><input class="form-input" style="padding:14px 16px;font-size:15px" value="${escapeHtml(currentUser.username)}" disabled></div>
              <div class="form-group"><label class="form-label" style="font-size:15px">邮箱</label><input class="form-input" style="padding:14px 16px;font-size:15px" value="${escapeHtml(currentUser.email||'未设置')}" disabled></div>
            </div>
            <div class="form-group"><label class="form-label" style="font-size:15px">最后登录</label><input class="form-input" style="padding:14px 16px;font-size:15px" value="${currentUser.last_login?formatDate(currentUser.last_login):'首次登录'}" disabled></div>
          </div></div>
          <div class="card"><div class="card-body" style="padding:32px">
            <h3 style="margin-bottom:24px;font-size:24px">修改密码</h3>
            <div class="form-group"><label class="form-label" style="font-size:15px">原密码</label><input class="form-input" style="padding:14px 16px;font-size:15px" type="password" id="pc-old-pwd" placeholder="请输入原密码"></div>
            <div class="form-group"><label class="form-label" style="font-size:15px">新密码</label><input class="form-input" style="padding:14px 16px;font-size:15px" type="password" id="pc-new-pwd" placeholder="请输入新密码（6位以上）"></div>
            <div class="form-group"><label class="form-label" style="font-size:15px">确认新密码</label><input class="form-input" style="padding:14px 16px;font-size:15px" type="password" id="pc-confirm-pwd" placeholder="再次输入新密码"></div>
            <button class="btn btn-primary" onclick="pcChangePwd()" style="width:100%;padding:16px;font-size:16px">修改密码</button>
          </div></div>
        </div>
      </div>`;
  }

  window.pcChangePwd = async function () {
    const oldPwd = document.getElementById('pc-old-pwd').value;
    const newPwd = document.getElementById('pc-new-pwd').value;
    const confirmPwd = document.getElementById('pc-confirm-pwd').value;
    if (!oldPwd||!newPwd) { showToast('请填写完整'); return; }
    if (newPwd.length < 6) { showToast('新密码至少6位'); return; }
    if (newPwd!==confirmPwd) { showToast('两次密码不一致'); return; }
    const res = await API.post('user/', { action:'password', old_password:oldPwd, new_password:newPwd });
    showToast(res.msg);
  };

  window.logoutPC = async function () {
    try {
      const res = await API.post('login/?action=logout');
      if (res.code !== 200) {
        console.warn('退出登录API返回错误:', res.msg);
      }
    } catch (err) {
      console.error('退出登录API调用失败:', err);
    }
    Storage.remove('currentUser');
    window.location.href = '../index.html';
  };

  init();
})();
</script>

<!-- ==================== PC 端弹窗 ==================== -->

      <div class="form-group"><label class="form-label">昵称</label><input class="form-input" id="form-user-nickname" placeholder="请输入昵称"></div>
      <div class="form-group"><label class="form-label">邮箱</label><input class="form-input" id="form-user-email" placeholder="选填"></div>
      <div class="form-group"><label class="form-label">手机</label><input class="form-input" id="form-user-phone" placeholder="选填"></div>
