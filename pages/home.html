<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>RBAC 权限管理系统</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="../assets/css/material-icons.css?v=3.0.0">
  <link rel="stylesheet" href="../assets/css/global.css?v=3.0.0">
  <link rel="stylesheet" href="../assets/css/pc.css?v=3.0.0">
  <link rel="stylesheet" href="../assets/css/app.css?v=3.0.0">
  <link rel="stylesheet" href="../assets/css/themes.css?v=3.0.0">
  <script src="../assets/js/apexcharts.min.js"></script>
</head>
<body>

<!-- PC / Pad 端布局 -->
<div class="pc-layout" id="pc-layout">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <h2><i class="mi mi-lg">lock</i> RBAC</h2>
      <p>权限管理系统 v3.0</p>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" onclick="logoutPC()" style="color:rgba(255,255,255,0.5)">
        <span class="nav-icon"><i class="mi mi-sm">logout</i></span><span>退出登录</span>
      </div>
    </div>
  </aside>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left" style="display:flex;align-items:center;gap:8px"><button class="sidebar-toggle-btn" id="sidebar-toggle" onclick="toggleSidebar()"><i class="mi">menu</i></button><h1 id="page-title">系统首页</h1></div>
      <div class="topbar-right">
        <button class="theme-toggle-btn" onclick="ThemeSwitcher.toggle()" title="切换主题"><i class="mi">palette</i></button>
        <div class="user-info" id="pc-user-info">
          <div class="user-avatar" id="pc-avatar">A</div>
          <span id="pc-nickname">管理员</span>
          <i class="mi mi-sm" style="margin-left:4px;color:var(--text-tertiary)">expand_more</i>
        </div>
        <div class="user-dropdown" id="user-dropdown">
          <div class="dropdown-item" onclick="pcNavigate(\'mine\')">
            <i class="mi mi-16">account_circle</i>
            <span>个人中心</span>
          </div>
          <div class="dropdown-item" onclick="logoutPC()">
            <i class="mi mi-16" style="color:var(--danger)">logout</i>
            <span>退出登录</span>
          </div>
        </div>
      </div>
    </div>
    <div class="page-content" id="page-content">
      <div class="text-center" style="padding:48px"><div class="spinner" style="margin:0 auto"></div></div>
    </div>
  </div>
</div>

<!-- 手机端 APP 风格布局 -->
<div class="app-shell" id="app-shell">
  <div class="app-navbar">
    <div class="navbar-back" id="navbar-back" style="display:none"><i class="mi mi-light">arrow_back</i></div>
    <div class="navbar-title">首页</div>
    <div class="navbar-action" id="navbar-action" onclick="ThemeSwitcher.showMobileSheet()" style="cursor:pointer"><i class="mi mi-light" style="font-size:20px">palette</i></div>
  </div>
  <div class="app-pages" id="app-pages"></div>
  <div class="app-tabbar" id="app-tabbar"></div>
</div>

<!-- PC 端弹窗容器 -->
<div id="modal-container"></div>

<!-- PC 端主题切换面板 -->
<div class="theme-panel" id="theme-panel">
  <div class="theme-panel-title">选择主题</div>
  <div class="theme-grid" id="theme-grid"></div>
</div>

<script src="../assets/js/core.js?v=3.1.0"></script>
<script src="../assets/js/shared-ops.js?v=3.1.0"></script>
<script src="../assets/js/shared-utils.js?v=3.1.0"></script>
<script src="../assets/js/theme-switcher.js?v=3.1.0"></script>
<script src="../assets/js/modals.js?v=3.1.0"></script>
<script src="../assets/js/app-core.js?v=3.1.0"></script>
<script src="../assets/js/app-home.js?v=3.1.0"></script>
<script src="../assets/js/app-users.js?v=3.1.0"></script>
<script src="../assets/js/app-roles.js?v=3.1.0"></script>
<script src="../assets/js/app-routers.js?v=3.1.0"></script>
<script src="../assets/js/app-mine.js?v=3.1.0"></script>
<script src="../assets/js/app-logs.js?v=3.1.0"></script>
<script src="../assets/js/pc-core.js?v=3.1.0"></script>
<script src="../assets/js/pc-home.js?v=3.1.0"></script>
<script src="../assets/js/pc-users.js?v=3.1.0"></script>
<script src="../assets/js/pc-roles.js?v=3.1.0"></script>
<script src="../assets/js/pc-routers.js?v=3.1.0"></script>
<script src="../assets/js/pc-logs.js?v=3.1.0"></script>
<script src="../assets/js/pc-mine.js?v=3.1.0"></script>
<script src="../assets/js/pc-pages.js?v=3.1.0"></script>
<script>
(function () {
  if (window.innerWidth <= 768) return;

  // 侧边栏开关（支持 Pad 端展开/收起 + 移动端 Drawer）
  window.closeSidebar = function() {
    var sidebar = document.getElementById('sidebar');
    var overlay = document.getElementById('sidebar-overlay');
    if (sidebar) {
      sidebar.classList.remove('open');
      sidebar.classList.remove('expanded');
    }
    if (overlay) overlay.classList.remove('active');
  };
  window.toggleSidebar = function() {
    var sidebar = document.getElementById('sidebar');
    var overlay = document.getElementById('sidebar-overlay');
    if (!sidebar) return;
    var w = window.innerWidth;
    if (w <= 768) {
      // 移动端：Drawer 开关
      var isOpen = sidebar.classList.contains('open');
      if (isOpen) {
        window.closeSidebar();
      } else {
        sidebar.classList.add('open');
        if (overlay) overlay.classList.add('active');
      }
    } else if (w <= 1024) {
      // Pad 端：紧凑 ↔ 完整切换
      sidebar.classList.toggle('expanded');
    }
  };

  var currentUser = null;
  var userRouters = [];

  function init() {
    API.get('login/').then(function(res) {
      if (res.code !== 200) { window.location.href = '../index.html'; return; }
      currentUser = res.data;
      Storage.set('currentUser', currentUser);

      document.getElementById('pc-nickname').textContent = currentUser.nickname || currentUser.username;
      if (currentUser.avatar) {
        document.getElementById('pc-avatar').innerHTML = '<img src="' + escapeHtml(currentUser.avatar) + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover">';
      } else {
        document.getElementById('pc-avatar').textContent = getInitial(currentUser.nickname || currentUser.username);
      }

      if (window.ModalTemplates) ModalTemplates.inject();
      if (window.ThemeSwitcher) {
        var themeGrid = document.getElementById('theme-grid');
        if (themeGrid) {
          themeGrid.innerHTML = window.ThemeSwitcher.themes.map(function (t) {
            var current = window.ThemeSwitcher.get();
            return '<div class="theme-option' + (t.id === current ? ' active' : '') + '" data-theme="' + t.id + '" onclick="ThemeSwitcher.set(\'' + t.id + '\')">'
              + '<div class="theme-dot" style="background:' + t.dot + '"></div>'
              + '<div class="theme-label">' + t.name + '</div>'
              + '</div>';
          }).join('');
        }
      }

      API.get('router/', { action: 'user' }).then(function(rRes) {
        if (rRes.code === 200) {
          userRouters = rRes.data || [];
          window._userRouters = userRouters;
          renderSidebar();
          var first = userRouters.length > 0 ? userRouters[0].router_path : 'home';
          pcNavigate(first);
        }
      });
    });
  }

  function renderSidebar() {
    document.getElementById('sidebar-nav').innerHTML = userRouters.map(function(r) {
      return '<div class="nav-item" data-page="' + r.router_path + '" onclick="pcNavigate(\'' + r.router_path + '\')">'
        + '<span class="nav-icon"><i class="mi">' + (r.icon || 'description') + '</i></span><span>' + escapeHtml(r.router_name) + '</span>'
        + '</div>';
    }).join('');
  }

  window.pcNavigate = function (page) {
    // 导航后自动收起侧边栏（Pad 收起展开态，移动端关闭 Drawer）
    if (window.innerWidth <= 768) window.closeSidebar();
    else if (window.innerWidth <= 1024) document.getElementById('sidebar').classList.remove('expanded');
    document.querySelectorAll('.nav-item').forEach(function(n) {
      n.classList.toggle('active', n.dataset.page === page);
    });
    var route = userRouters.find(function(r) { return r.router_path === page; });
    document.getElementById('page-title').textContent = route ? route.router_name : page;

    var container = document.getElementById('page-content');
    container.innerHTML = '<div class="text-center" style="padding:48px"><div class="spinner" style="margin:0 auto"></div></div>';

    var loaders = {
      home: PCPages.loadHome,
      user: PCPages.loadUser,
      role: PCPages.loadRole,
      router: PCPages.loadRouter,
      mine: PCPages.loadMine,
      log: PCPages.loadLog
    };
    if (loaders[page]) {
      loaders[page](container);
      if (window._checkIconFont) setTimeout(_checkIconFont, 50);
    } else {
      container.innerHTML =
        '<div class="page-404">'
        + '<div class="code">404</div>'
        + '<div class="title">页面不存在</div>'
        + '<div class="desc">你访问的页面不存在或已被移除，请检查地址是否正确。</div>'
        + '<div class="actions">'
        + '<button class="btn btn-primary" onclick="pcNavigate(\'home\')">' + mi('home', 'mi-18') + ' 返回首页</button>'
        + '<button class="btn btn-outline" onclick="history.back()">' + mi('arrow_back', 'mi-18') + ' 返回上一页</button>'
        + '</div></div>';
    }
  };

  window.logoutPC = function () {
    API.post('login/?action=logout').then(function() {}).catch(function() {});
    Storage.remove('currentUser');
    window.location.href = '../index.html';
  };

  init();
})();
</script>

</body>
</html>
